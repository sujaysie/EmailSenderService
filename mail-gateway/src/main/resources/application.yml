spring:
  application:
    name: mail-gateway
  datasource:
    url: jdbc:postgresql://localhost:5432/mail_gateway
    username: mail_gateway_user
    password: mail_gateway_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

server:
  port: 8081

logging:
  level:
    com.example.emailsender.gateway: INFO
