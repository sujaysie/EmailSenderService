spring:
  application:
    name: template-service
  datasource:
    url: jdbc:postgresql://localhost:5432/template_service
    username: template_service_user
    password: template_service_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
  cache:
    type: simple

server:
  port: 8082

logging:
  level:
    com.example.emailsender.template: INFO
